<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrthoTyping Assessment</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 32px auto; padding: 18px; line-height: 1.5; background: #f7f7f7; }
    .card { background: white; padding: 24px; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-top: 12px; }
    input, textarea, select, button { width: 100%; padding: 11px; margin-top: 6px; font-size: 16px; box-sizing: border-box; }
    input[readonly] { background: #eee; }
    textarea { min-height: 190px; resize: vertical; }
    #promptText { background: #f0f0f0; padding: 16px; border-radius: 8px; white-space: pre-wrap; font-size: 18px; min-height: 100px; }
    button { cursor: pointer; border: 0; border-radius: 8px; margin-top: 16px; background: #222; color: white; font-weight: bold; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .results { display: grid; grid-template-columns: repeat(auto-fit,minmax(160px,1fr)); gap: 12px; }
    .metric { background: #f2f2f2; padding: 12px; border-radius: 8px; }
    .status { font-weight: bold; }
    .error { color: #a00000; }
    .success { color: #176b2c; }
    .small { font-size: 14px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>OrthoTyping Assessment</h1>
    <p class="small">Use only a de-identified Study ID. Do not place names, medical record numbers, dates of birth, or other PHI in the link.</p>

    <label for="studyId">Study ID</label>
    <input id="studyId" readonly />

    <label for="visit">Visit</label>
    <select id="visit">
      <option value="Baseline">Baseline</option>
      <option value="Post-op 2 weeks">Post-op 2 weeks</option>
      <option value="Post-op 6 weeks">Post-op 6 weeks</option>
      <option value="Post-op 3 months">Post-op 3 months</option>
      <option value="Other">Other</option>
    </select>

    <button id="beginButton" onclick="beginAssessment()">Begin Assessment</button>
    <p id="setupStatus" class="status"></p>
  </div>

  <div class="card">
    <h2>Prompt</h2>
    <div id="promptText">Select the visit and press “Begin Assessment.”</div>

    <label for="typedText">Typed Response</label>
    <textarea id="typedText" placeholder="Begin typing here..." disabled></textarea>

    <button id="submitButton" onclick="submitTest()" disabled>Submit Test</button>
    <p id="testStatus" class="status"></p>
  </div>

  <div class="card" id="resultsCard" hidden>
    <h2>Results</h2>
    <div class="results">
      <div class="metric"><strong>Time</strong><br><span id="timeResult">—</span></div>
      <div class="metric"><strong>WPM</strong><br><span id="wpmResult">—</span></div>
      <div class="metric"><strong>Accuracy</strong><br><span id="accuracyResult">—</span></div>
      <div class="metric"><strong>Errors</strong><br><span id="errorResult">—</span></div>
      <div class="metric"><strong>Prompt ID</strong><br><span id="promptIdResult">—</span></div>
    </div>
  </div>

<script>
// Replace this with the /exec URL from your deployed Google Apps Script web app.
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzh4JiznkUgiWW2VCUgRN1QSZ0VvkZlnaeG83WwJWPbYWBRW9mSsjMxfMhkV4ZVYKTq/exec";

let targetPrompt = "";
let promptId = "";
let assignmentId = "";
let startTime = null;
let submitted = false;

const typedBox = document.getElementById("typedText");
const studyIdBox = document.getElementById("studyId");

function getStudyIdFromUrl() {
  const id = new URLSearchParams(window.location.search).get("id");
  studyIdBox.value = id ? id.trim().toUpperCase() : "";
  if (!id) {
    document.getElementById("setupStatus").textContent = "This link is missing a Study ID. Ask the study team for the correct participant-specific link.";
    document.getElementById("setupStatus").className = "status error";
    document.getElementById("beginButton").disabled = true;
  }
}

async function beginAssessment() {
  const studyId = studyIdBox.value;
  const visit = document.getElementById("visit").value;
  const button = document.getElementById("beginButton");

  if (!studyId) return;
  if (SCRIPT_URL.includes("PASTE_YOUR")) {
    alert("Add your Google Apps Script /exec URL to index.html first.");
    return;
  }

  button.disabled = true;
  document.getElementById("visit").disabled = true;
  setSetupStatus("Assigning an unused prompt...", "");

  try {
    const url = `${SCRIPT_URL}?action=assignPrompt&study_id=${encodeURIComponent(studyId)}&visit=${encodeURIComponent(visit)}`;
    const response = await fetch(url, { method: "GET", redirect: "follow" });
    const data = await response.json();

    if (!data.success) throw new Error(data.message || "Unable to assign a prompt.");

    promptId = data.prompt_id;
    targetPrompt = data.prompt_text;
    assignmentId = data.assignment_id;

    document.getElementById("promptText").textContent = targetPrompt;
    typedBox.disabled = false;
    typedBox.value = "";
    typedBox.focus();
    document.getElementById("submitButton").disabled = false;
    setSetupStatus(`Prompt assigned.`, "success");
    document.getElementById("testStatus").textContent = "Timer starts on the first typed character. Backspace and Delete are disabled.";
  } catch (error) {
    setSetupStatus(error.message, "error");
    button.disabled = false;
    document.getElementById("visit").disabled = false;
  }
}

typedBox.addEventListener("keydown", event => {
  if (event.key === "Backspace" || event.key === "Delete") {
    event.preventDefault();
    document.getElementById("testStatus").textContent = "Backspace and Delete are disabled.";
    document.getElementById("testStatus").className = "status error";
    return;
  }
  if (!startTime && event.key.length === 1) {
    startTime = new Date();
    document.getElementById("testStatus").textContent = "Assessment in progress...";
    document.getElementById("testStatus").className = "status";
  }
});

// Also blocks common mobile/browser editing paths.
typedBox.addEventListener("beforeinput", event => {
  if (event.inputType && event.inputType.startsWith("delete")) event.preventDefault();
});

typedBox.addEventListener("paste", event => event.preventDefault());
typedBox.addEventListener("drop", event => event.preventDefault());

async function submitTest() {
  if (submitted) return;
  if (!startTime) {
    alert("No typing was detected.");
    return;
  }

  const typedText = typedBox.value;
  const endTime = new Date();
  const timeSec = (endTime - startTime) / 1000;
  const score = calculateScore(targetPrompt, typedText, timeSec);

  const record = {
    action: "saveResult",
    assignment_id: assignmentId,
    study_id: studyIdBox.value,
    visit: document.getElementById("visit").value,
    prompt_id: promptId,
    prompt_text: targetPrompt,
    typed_response: typedText,
    test_datetime: endTime.toISOString(),
    time_sec: timeSec.toFixed(2),
    wpm: score.wpm.toFixed(2),
    accuracy_percent: score.accuracy.toFixed(2),
    error_count: score.errors,
    correct_characters: score.correct,
    total_typed_characters: typedText.length,
    prompt_length: targetPrompt.length
  };

  submitted = true;
  typedBox.disabled = true;
  document.getElementById("submitButton").disabled = true;
  document.getElementById("testStatus").textContent = "Saving results...";
  document.getElementById("testStatus").className = "status";

  try {
    // text/plain avoids a browser CORS preflight while Apps Script still receives JSON text.
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(record)
    });

    displayResults(record);
    document.getElementById("testStatus").textContent = "Assessment submitted. You may now close this page.";
    document.getElementById("testStatus").className = "status success";
  } catch (error) {
    submitted = false;
    typedBox.disabled = false;
    document.getElementById("submitButton").disabled = false;
    document.getElementById("testStatus").textContent = "The result could not be sent. Check the internet connection and submit again.";
    document.getElementById("testStatus").className = "status error";
  }
}

function calculateScore(prompt, typed, timeSec) {
  let correct = 0;
  const maxLen = Math.max(prompt.length, typed.length);
  for (let i = 0; i < maxLen; i++) if (typed[i] === prompt[i]) correct++;
  const errors = maxLen - correct;
  const accuracy = maxLen ? (correct / maxLen) * 100 : 0;
  const wpm = timeSec > 0 ? (typed.length / 5) / (timeSec / 60) : 0;
  return { correct, errors, accuracy, wpm };
}

function displayResults(record) {
  document.getElementById("resultsCard").hidden = false;
  document.getElementById("timeResult").textContent = `${record.time_sec} sec`;
  document.getElementById("wpmResult").textContent = record.wpm;
  document.getElementById("accuracyResult").textContent = `${record.accuracy_percent}%`;
  document.getElementById("errorResult").textContent = record.error_count;
  document.getElementById("promptIdResult").textContent = record.prompt_id;
}

function setSetupStatus(message, type) {
  const el = document.getElementById("setupStatus");
  el.textContent = message;
  el.className = `status ${type}`;
}

getStudyIdFromUrl();
</script>
</body>
</html>
